<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GabDrive — Stockage Personnel</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">📦</div>
      <div class="logo-text">Gab<span>Drive</span></div>
    </div>

    <div class="storage-info">
      <div class="storage-label">
        <span>Stockage</span>
        <span id="storage-text">0 MB / 5 GB</span>
      </div>
      <div class="storage-bar">
        <div class="storage-fill" id="storage-fill" style="width:0%"></div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-section-title">Parcourir</div>
      <div class="nav-item active" data-view="all"       onclick="setView(this)"><span class="icon">🏠</span> Tout       <span class="nav-badge" id="badge-all">0</span></div>
      <div id="sidebar-folders"></div>
      <div class="nav-item"        data-view="recent"    onclick="setView(this)"><span class="icon">🕐</span> Récents    <span class="nav-badge" id="badge-recent">0</span></div>
      <div class="nav-item"        data-view="starred"   onclick="setView(this)"><span class="icon">⭐</span> Favoris    <span class="nav-badge" id="badge-starred">0</span></div>
      <div class="nav-item"        data-view="trash"     onclick="setView(this)"><span class="icon">🗑️</span> Corbeille  <span class="nav-badge" id="badge-trash">0</span></div>
      <div class="nav-section-title" style="margin-top:8px">Types</div>
      <div class="nav-item" data-view="images"    onclick="setView(this)"><span class="icon">🖼️</span> Images    <span class="nav-badge" id="badge-images">0</span></div>
      <div class="nav-item" data-view="documents" onclick="setView(this)"><span class="icon">📄</span> Documents <span class="nav-badge" id="badge-documents">0</span></div>
      <div class="nav-item" data-view="videos"    onclick="setView(this)"><span class="icon">🎬</span> Vidéos    <span class="nav-badge" id="badge-videos">0</span></div>
      <div class="nav-item" data-view="audio"     onclick="setView(this)"><span class="icon">🎵</span> Audio     <span class="nav-badge" id="badge-audio">0</span></div>
      <div class="nav-item" data-view="archives"  onclick="setView(this)"><span class="icon">🗜️</span> Archives  <span class="nav-badge" id="badge-archives">0</span></div>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Rechercher des fichiers..." oninput="renderFiles()">
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="grid-btn" onclick="setLayout('grid')" title="Grille">▦</button>
        <button class="view-btn"        id="list-btn" onclick="setLayout('list')" title="Liste">☰</button>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-secondary" onclick="openFolderModal()">📁 Dossier</button>
        <button class="btn btn-secondary" onclick="document.getElementById('import-vault-input').click()" title="Restaurer un backup .gabdrive">📥 Restaurer</button>
        <button class="btn btn-secondary" onclick="exportVault()" title="Exporter tout le drive en .gabdrive">📤 Exporter drive</button>
        <button class="btn btn-secondary" onclick="exportSelected()" title="Télécharger les fichiers sélectionnés (ou tous)">⬇ Télécharger</button>
        <button class="btn btn-primary"   onclick="document.getElementById('file-input').click()">⬆ Importer fichiers</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- DROP OVERLAY -->
<div class="drop-overlay" id="drop-overlay">
  <div class="drop-message">
    <div style="font-size:64px">📦</div>
    <h2>Déposer les fichiers ici</h2>
    <p>Relâchez pour importer</p>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="context-menu" id="ctx-menu">
  <div id="ctx-menu-inner"></div>
</div>

<!-- SELECTION BAR -->
<div class="selection-bar" id="selection-bar">
  <span class="selection-count"><strong id="sel-count">0</strong> sélectionné(s)</span>
  <button class="btn btn-secondary"                            onclick="downloadSelected()">⬇ Télécharger</button>
  <button class="btn btn-secondary" id="btn-star-sel"          onclick="starSelected()">⭐ Favori</button>
  <button class="btn btn-secondary" style="color:var(--danger)" onclick="deleteSelected()">🗑️ Supprimer</button>
  <button class="btn btn-secondary"                            onclick="clearSelection()">✕ Annuler</button>
</div>

<!-- UPLOAD PROGRESS -->
<div class="upload-progress" id="upload-progress">
  <h4 id="progress-title">Importation en cours...</h4>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL — New folder -->
<div class="modal-bg" id="modal-folder">
  <div class="modal">
    <h2>📁 Nouveau dossier</h2>
    <input type="text" id="folder-name" placeholder="Nom du dossier" />
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-folder')">Annuler</button>
      <button class="btn btn-primary"   onclick="createFolder()">Créer</button>
    </div>
  </div>
</div>

<!-- MODAL — Rename -->
<div class="modal-bg" id="modal-rename">
  <div class="modal">
    <h2>✏️ Renommer</h2>
    <input type="text" id="rename-input" placeholder="Nouveau nom" />
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-rename')">Annuler</button>
      <button class="btn btn-primary"   onclick="doRename()">Renommer</button>
    </div>
  </div>
</div>

<!-- MODAL — Preview -->
<div class="modal-bg" id="modal-preview" style="z-index: 9999;">
  <div class="modal" style="width: 80vw; height: 80vh; max-width: none; max-height: none; display: flex; flex-direction: column; padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h2 id="preview-title" style="margin: 0; font-size: 1.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90%;"></h2>
      <button class="icon-btn" onclick="closeModal('modal-preview')" style="font-size: 24px; color: #f38ba8; cursor: pointer;">✕</button>
    </div>
    <div id="preview-content" style="flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; background: #11111b; border-radius: 8px;">
    </div>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="file-input"          multiple style="display:none" onchange="handleFileInput(this.files)">
<input type="file" id="import-vault-input"  accept=".gabdrive,.json" style="display:none" onchange="importVault(this.files)">

<!-- Lasso selection box -->
<div id="lasso-box"></div>

<!-- Script -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="app.js"></script>

</body>
</html>
